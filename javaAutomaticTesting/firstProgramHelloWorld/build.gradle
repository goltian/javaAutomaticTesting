plugins {
    id 'java'
    id 'application'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation("org.testng:testng:7.12.0")
    testImplementation("org.testng:testng:7.12.0") // для тестов
    testImplementation 'org.slf4j:slf4j-simple:2.0.9'
}

test {
    useTestNG()
    testLogging {
        events "passed", "skipped", "failed"
    }
}